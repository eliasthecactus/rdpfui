name: Build and release

on:
  push:
    branches:
      - main

permissions:
  contents: write # Needed to create releases

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            platform: linux-amd64
          - os: macos-latest
            goos: darwin
            platform: darwin-amd64
          - os: windows-latest
            goos: windows
            platform: windows-amd64

    runs-on: ${{ matrix.os }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxcursor-dev libxrandr-dev libinerama-dev libxi-dev libgl1-mesa-dev libxxf86vm-dev

      - uses: actions/setup-go@v4
        with:
          go-version: '1.20'
          cache: true

      - name: Compute version
        id: version
        run: echo "version=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
        shell: bash
        run: |
          mkdir -p release
          # Note: Extension added for Windows (.exe)
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then EXT=".exe"; fi
          
          go build -o release/rdpfui-${{ steps.version.outputs.version }}-${{ matrix.platform }}$EXT
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rdpfui-${{ matrix.platform }}
          path: release/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true # Flattens the folder structure
          
      - name: Create GitHub release
        uses: ncipollo/release-action@v2
        with:
          tag: v${{ needs.build.outputs.version }}
          name: Release v${{ needs.build.outputs.version }}
          body: Automated binaries built from main branch.
          files: artifacts/*
          token: ${{ secrets.GITHUB_TOKEN }}