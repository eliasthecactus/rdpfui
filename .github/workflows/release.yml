name: Build and release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.os }}
    outputs:
      version: ${{ steps.version.outputs.version }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            platform: linux-amd64
          - os: macos-latest
            goos: darwin
            platform: darwin-amd64
          - os: windows-latest
            goos: windows
            platform: windows-amd64

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.20'
      - name: Compute release version
        id: version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: 1.0
        run: |
          api_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases?per_page=100"
          releases=$(curl -s \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$api_url")

          count=$(echo "$releases" | python3 - "$VERSION" <<'PY'
          import json,sys
          releases = json.load(sys.stdin)
          base = sys.argv[1]
          print(sum(1 for r in releases if r.get('tag_name', '').startswith(base + '.')))
          PY
          )
          build_num=$((count + 1))
          full_version="${VERSION}.${build_num}"
          echo "version=${full_version}" >> $GITHUB_OUTPUT
          echo "platform=${{ matrix.platform }}" >> $GITHUB_OUTPUT
      - name: Build binary
        run: |
          mkdir -p release
          GOOS=${{ matrix.goos }} GOARCH=amd64 go build -o release/rdpfui-${{ steps.version.outputs.version }}-${{ matrix.platform }}
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: rdpfui-${{ steps.version.outputs.version }}-${{ matrix.platform }}
          path: release/rdpfui-${{ steps.version.outputs.version }}-${{ matrix.platform }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release
      - name: Create GitHub release
        uses: ncipollo/release-action@v2
        with:
          tag: ${{ needs.build.outputs.version }}
          name: Release ${{ needs.build.outputs.version }}
          body: Automated binaries built from main branch.
          files: release/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
